events {}

http {
  # Rate limit for live execution endpoint.
  # Tune based on your risk tolerance and expected operator traffic.
  limit_req_zone $binary_remote_addr zone=live_trade_rate:10m rate=12r/m;

  # Ops-network allowlist.
  # Replace these CIDRs with your exact office/VPN/NAT egress ranges.
  geo $ops_allowlisted_ip {
    default 0;
    127.0.0.1/32 1;
    ::1/128 1;
    10.0.0.0/8 1;
    172.16.0.0/12 1;
    192.168.0.0/16 1;
  }

  upstream backend_upstream {
    server backend:8000;
  }

  server {
    listen 8080;

    # API-gateway live guard: reject unsigned live calls before backend.
    location = /api/v1/trading/execute-live {
      if ($ops_allowlisted_ip = 0) { return 403; }

      # Per-IP throttling for live trading calls.
      limit_req zone=live_trade_rate burst=5 nodelay;
      limit_req_status 429;

      if ($http_x_live_nonce = "") { return 403; }
      if ($http_x_live_timestamp = "") { return 403; }
      if ($http_x_live_signature = "") { return 403; }

      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://backend_upstream/api/v1/trading/execute;
    }

    # All other API traffic passes through unchanged.
    location /api/ {
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://backend_upstream;
    }
  }
}
